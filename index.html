<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PCP Community</title>

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/responsive.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>

<body>

<header>
    <h1>PCP Community</h1>
    <p>Ranking Oficial</p>
</header>

<nav>
    <a href="#ranking">Ranking</a>
    <a href="#top3">Top 3</a>
    <a href="#noticias">Noticias</a>
    <a href="#estadisticas">Estadísticas</a>
    <a href="#salon">Salón de la Fama</a>
</nav>

<main>

<section id="top3">
    <h2>🏆 Top 3</h2>
    <div id="top3-container"></div>
</section>

<section id="ranking">
    <h2>📊 Ranking PCP</h2>

    <input
        type="text"
        id="buscarJugador"
        placeholder="Buscar jugador..."
    >

    <table id="tablaRanking">
        <thead>
            <tr>
                <th>#</th>
                <th>Jugador</th>
                <th>Puntos</th>
                <th>Nivel</th>
            </tr>
        </thead>

        <tbody>

        </tbody>

    </table>

</section>

<section id="noticias">
    <h2>📰 Noticias</h2>
    <div id="noticias-container"></div>
</section>

<section id="estadisticas">
    <h2>📈 Estadísticas</h2>
    <div id="estadisticas-container"></div>
</section>

<section id="salon">
    <h2>⭐ Salón de la Fama</h2>
    <div id="salon-container"></div>
</section>

</main>

<footer>

PCP Community © 2025

</footer>

<script src="js/sheets.js"></script>
<script src="js/app.js"></script>

</body>
</html>
